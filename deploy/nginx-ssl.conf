# Constitutional Tender — Nginx with SSL (Certbot)
#
# SETUP INSTRUCTIONS:
# 1. Replace YOUR_DOMAIN.com with your actual domain
# 2. Point your domain's DNS A record to YOUR_SERVER_IP
# 3. Copy this file: sudo cp nginx-ssl.conf /etc/nginx/sites-available/constitutional-tender
# 4. Enable it: sudo ln -sf /etc/nginx/sites-available/constitutional-tender /etc/nginx/sites-enabled/
# 5. Remove default: sudo rm -f /etc/nginx/sites-enabled/default
# 6. Test config: sudo nginx -t
# 7. Reload: sudo systemctl reload nginx
# 8. Get SSL cert: sudo certbot --nginx -d YOUR_DOMAIN.com -d www.YOUR_DOMAIN.com
# 9. Certbot will auto-modify this file to add SSL blocks

upstream ct_web {
    server 127.0.0.1:3000;
}

upstream ct_api {
    server 127.0.0.1:4000;
}

# Redirect HTTP to HTTPS (Certbot will configure this)
server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Certbot challenge support
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    # Temporary: serve directly on HTTP until SSL is set up
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API requests
    location /api/ {
        proxy_pass http://ct_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support
        proxy_buffering off;
        proxy_read_timeout 86400s;

        # Request size limit (for file uploads)
        client_max_body_size 10M;
    }

    # Stripe webhook (no body limit, no buffering)
    location /api/payments/webhook/ {
        proxy_pass http://ct_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://ct_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://ct_web;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Block common attack paths
    location ~ /\.(env|git|svn|htaccess) {
        deny all;
        return 404;
    }

    location ~ /\.(php|asp|aspx|jsp)$ {
        deny all;
        return 404;
    }
}

